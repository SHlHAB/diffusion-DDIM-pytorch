### model params
Model:
  in_channels: 1
  out_channels: 1
  model_channels: 128
  attention_resolutions: [2, ]
  num_res_blocks: 2
  dropout: 0.1
  channel_mult: [1, 2, 2, 2]
  conv_resample: True
  num_heads: 4

### dataset params
Dataset:
  # Deciding which dataset to use, must be one of {'mnist', 'cifar', 'custom'}.
  dataset: "mnist"
  # If mnist and cifar datasets, whether to use the training set.
  train: True
  # Folder of data sets. When `dataset = custom`, this parameter can be a list with different folders.
  # Then all images in the list with suffixes in `suffix` in the folder will be loaded.
  data_path: "./data"
  # If mnist and cifar datasets, whether to download it.
  download: True
  # MNIST is natively 28x28, but the UNet (channel_mult [1,2,2,2] -> 3 downsamples)
  # needs a size divisible by 8, so we resize to 32x32 in the dataset transform.
  image_size: [ 32, 32 ]

  # If custom dataset, what is the mode of the image. must be one of {'RGB', 'L', 'CMYK'}.
  mode: "RGB"
  # If custom dataset, decide what suffix to load for the image.
  suffix: ["png", "jpg"]

  # parameters for torch.utils.data.DataLoader
  # batch_size 128 better feeds a CUDA H100 (the model is small at 32x32);
  # data loading, not compute, is the likely bottleneck on that GPU.
  batch_size: 128
  shuffle: True
  drop_last: True
  # pin_memory speeds host->GPU copies on CUDA. It is a no-op/warning on MPS;
  # get_device() handles the device, but flip this to False for pure-MPS runs.
  pin_memory: True
  num_workers: 8

### trainer params
Trainer:
  # sample time steps
  T: 1000
  beta: [0.0001, 0.02]


### callback params
Callback:
  # The save path for checkpoint.
  filepath: "./checkpoint/mnist.pth"
  # Frequency of checkpoint saving.
  save_freq: 1

### train params
# "cuda" targets the Newton H100; get_device() auto-falls back to mps/cpu
# (e.g. on a local Mac), so this same config runs in both places.
device: "cuda"
epochs: 50
# Whether to continue training, True or False
consume: False
# If continue training, which checkpoint to load
consume_path: "./checkpoint/mnist.pth"

### optimizer params
lr: 0.0002
